<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QoS 文件生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: #fff;
            border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; padding: 30px 40px; text-align: center;
        }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.85; }
        .body { padding: 40px; }
        .section { margin-bottom: 32px; }
        .section-title {
            font-size: 18px; font-weight: 600; color: #333; margin-bottom: 16px;
            padding-left: 12px; border-left: 4px solid #667eea;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 14px; font-weight: 500; color: #555; margin-bottom: 6px;
        }
        .form-group label .required { color: #e74c3c; margin-left: 2px; }
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s; background: #fafafa;
        }
        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15); background: #fff;
        }
        .form-group textarea {
            min-height: 100px; resize: vertical; line-height: 1.8;
        }
        .form-group .hint {
            font-size: 12px; color: #999; margin-top: 4px;
        }
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }

        .btn-generate {
            width: 100%; padding: 16px; font-size: 18px; font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.4); }
        .btn-generate:active { transform: translateY(0); }
        .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .status {
            margin-top: 20px; padding: 14px 18px; border-radius: 8px; font-size: 14px; display: none;
        }
        .status.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
        .status.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; display: block; }
        .status.loading { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; display: block; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }

        .radio-group { display: flex; gap: 24px; align-items: center; }
        .radio-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .radio-item input[type="radio"] { width: 18px; height: 18px; accent-color: #667eea; }
        .radio-item label { margin: 0; cursor: pointer; user-select: none; font-size: 14px; }

        .level-hint {
            margin-top: 8px; padding: 8px 12px; background: #f0f4ff;
            border-radius: 6px; font-size: 12px; color: #5566cc;
        }

        /* 动态显示/隐藏区域 */
        .conditional-section {
            display: none;
            transition: opacity 0.3s;
        }
        .conditional-section.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QoS 文件生成器</h1>
            <p>填写项目信息，一键生成设计复核/审查卡片 docx 文件</p>
        </div>

        <div class="body">
            <!-- 项目信息 -->
            <div class="section">
                <div class="section-title">项目信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>项目名称及阶段 <span class="required">*</span></label>
                        <input type="text" id="project_name" placeholder="如：厦深动环改造施工图">
                    </div>
                    <div class="form-group">
                        <label>设计范围 <span class="required">*</span></label>
                        <input type="text" id="design_range" placeholder="如：厦深线">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>图名或文件名</label>
                        <input type="text" id="file_name" placeholder="如：施工图" value="施工图">
                    </div>
                    <div class="form-group">
                        <label>图号或图纸张数</label>
                        <input type="text" id="sheet_count" placeholder="如：1">
                    </div>
                </div>
                <div class="form-group">
                    <label>终审级别 <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="level_suoshi" name="final_level" value="所级">
                            <label for="level_suoshi">所级</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="level_yuan" name="final_level" value="院级" checked>
                            <label for="level_yuan">院级</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="level_gongsi" name="final_level" value="公司级">
                            <label for="level_gongsi">公司级</label>
                        </div>
                    </div>
                    <div class="level-hint" id="level_hint">
                        生成表格：复核卡片 + 所室级审查 + 院级审查
                    </div>
                </div>
            </div>

            <!-- 复核意见 -->
            <div class="section">
                <div class="section-title">复核意见（设表08-1/2）</div>
                <div class="form-group">
                    <label>复核意见内容</label>
                    <textarea id="review_opinions_text" placeholder="1. 补充委托。&#10;2. 信号机房应该不管，相应修改文件描述。&#10;3. 按现在方案我们没设置任何网安设备。&#10;4. 预备费应修改为3%。"></textarea>
                    <div class="hint">每行一条意见，序号请自行编写</div>
                </div>
                <div class="form-group">
                    <label>复核确认意见</label>
                    <input type="text" id="review_confirmation" value="确认已修改。" placeholder="如：确认已修改。">
                </div>
            </div>

            <!-- 所室级审查意见（始终显示） -->
            <div class="section">
                <div class="section-title">所室级审查意见（设表09-1）</div>
                <div class="form-group">
                    <label>审查意见内容</label>
                    <textarea id="audit_suoshi_text" placeholder="1、信号相关SU不拆的话，即有环境监控中心要不要拆？建议得保留。&#10;2、补充安装方式示意图。"></textarea>
                    <div class="hint">每行一条意见，序号请自行编写</div>
                </div>
            </div>

            <!-- 院级审查意见（终审>=院级时显示） -->
            <div class="section conditional-section visible" id="section_yuan">
                <div class="section-title">院级审查意见（设表09-1）</div>
                <div class="form-group">
                    <label>审查意见内容</label>
                    <textarea id="audit_yuan_text" placeholder="输入院级审查意见..."></textarea>
                    <div class="hint">每行一条意见，序号请自行编写</div>
                </div>
            </div>

            <!-- 公司级审查意见（终审=公司级时显示） -->
            <div class="section conditional-section" id="section_gongsi">
                <div class="section-title">公司级审查意见（设表09-1）</div>
                <div class="form-group">
                    <label>审查意见内容</label>
                    <textarea id="audit_gongsi_text" placeholder="输入公司级审查意见..."></textarea>
                    <div class="hint">每行一条意见，序号请自行编写</div>
                </div>
            </div>

            <!-- 生成按钮 -->
            <button class="btn-generate" id="btn_generate" onclick="generate()">
                生成 QoS 文件
            </button>

            <div class="status" id="status"></div>
        </div>

        <div class="footer">QoS 文件生成器 · 中铁二院通信</div>
    </div>

    <script>
        // 终审级别切换
        const levelHints = {
            '所级': '生成表格：复核卡片 + 所室级审查',
            '院级': '生成表格：复核卡片 + 所室级审查 + 院级审查',
            '公司级': '生成表格：复核卡片 + 所室级审查 + 院级审查 + 公司级审查',
        };

        function updateLevelVisibility() {
            const level = document.querySelector('input[name="final_level"]:checked').value;
            document.getElementById('level_hint').textContent = levelHints[level];

            // 所室级始终显示
            // 院级：>=院级 时显示
            const showYuan = level === '院级' || level === '公司级';
            document.getElementById('section_yuan').classList.toggle('visible', showYuan);

            // 公司级：=公司级 时显示
            const showGongsi = level === '公司级';
            document.getElementById('section_gongsi').classList.toggle('visible', showGongsi);
        }

        document.querySelectorAll('input[name="final_level"]').forEach(r => {
            r.addEventListener('change', updateLevelVisibility);
        });

        // 生成
        async function generate() {
            const project_name = document.getElementById('project_name').value.trim();
            const design_range = document.getElementById('design_range').value.trim();

            if (!project_name) { showStatus('请填写项目名称', 'error'); return; }
            if (!design_range) { showStatus('请填写设计范围', 'error'); return; }

            const final_level = document.querySelector('input[name="final_level"]:checked').value;

            const data = {
                project_name,
                design_range,
                file_name: document.getElementById('file_name').value.trim(),
                sheet_count: document.getElementById('sheet_count').value.trim(),
                final_audit_level: final_level,
                review_opinions_text: document.getElementById('review_opinions_text').value,
                review_confirmation: document.getElementById('review_confirmation').value.trim(),
                audit_suoshi_text: document.getElementById('audit_suoshi_text').value,
                audit_yuan_text: document.getElementById('audit_yuan_text').value,
                audit_gongsi_text: document.getElementById('audit_gongsi_text').value,
            };

            const btn = document.getElementById('btn_generate');
            btn.disabled = true;
            btn.textContent = '生成中...';
            showStatus('正在生成文件...', 'loading');

            try {
                const resp = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || '生成失败');
                }

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `QoS-${project_name}.docx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showStatus('文件已生成并开始下载！', 'success');
            } catch (e) {
                showStatus(e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '生成 QoS 文件';
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        // 初始化
        updateLevelVisibility();
    </script>
</body>
</html>
